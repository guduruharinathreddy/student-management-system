<!DOCTYPE html>
<html>
<head>
    <title>Update Student</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
    <h2 class="text-center">Update Student</h2>

    <form method="POST" class="mt-4">

        <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" class="form-control" value="{{ student[1] }}">
        </div>

        <div class="mb-3">
            <label>Age</label>
            <input type="number" name="age" class="form-control" value="{{ student[2] }}">
        </div>

        <div class="mb-3">
            <label>Course</label>
            <input type="text" name="course" class="form-control" value="{{ student[3] }}">
        </div>

        <div class="mb-3">
            <label>Marks</label>
            <input type="number" name="marks" class="form-control" value="{{ student[4] }}">
        </div>

        <div class="mb-3">
            <label>Attendance</label>
            <input type="number" name="attendance" class="form-control" value="{{ student[5] }}">
        </div>

        <button type="submit" class="btn btn-success">Update</button>
        <a href="/view" class="btn btn-secondary">Back</a>

    </form>
</div>

</body>
</html>
